site_name: chemdiagrams
site_url: https://Tonner-Zech-Group.github.io/chem-diagrams
repo_url: https://github.com/Tonner-Zech-Group/chem-diagrams

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Methods: methods.md
  - Usage: usage.md
  - Examples: examples.md
  - Templates: templates.md
  - API Reference: api/  # populated by the gen script
  - About: about.md

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            docstring_style: numpy

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition